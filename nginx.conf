server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── 정적 파일 서빙 ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── rv.or.kr 역방향 프록시 ──
    # /proxy/read_recovery.php?... → http://rv.or.kr/read_recovery.php?...
    location /proxy/ {
        proxy_pass         http://rv.or.kr/;
        proxy_set_header   Host       rv.or.kr;
        proxy_set_header   User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)";
        proxy_set_header   Referer    "http://rv.or.kr/";

        # 브라우저에서 직접 호출 가능하도록 CORS 허용
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

        # 원본 응답의 인코딩(EUC-KR) 그대로 전달
        proxy_pass_header  Content-Type;
    }
}
